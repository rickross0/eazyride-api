<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Provider Portal - EazyRide Car Rental</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f5f5f5; min-height: 100vh; }
    
    /* Login */
    .login-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
    .login-logo { text-align: center; margin-bottom: 30px; }
    .login-logo h1 { color: #0A8E4E; font-size: 28px; }
    .login-logo span { display: block; color: #666; font-size: 14px; margin-top: 5px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
    .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .form-group input:focus { outline: none; border-color: #0A8E4E; }
    .btn { width: 100%; padding: 14px; background: #0A8E4E; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #087a42; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: #666; }
    .btn-danger { background: #e74c3c; }
    .btn-small { padding: 8px 16px; font-size: 14px; width: auto; }
    
    /* Dashboard */
    .dashboard { display: none; }
    .header { background: #0A8E4E; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
    .header h2 { font-size: 20px; }
    .header button { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .tabs { display: flex; background: white; border-bottom: 1px solid #eee; }
    .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active { border-bottom-color: #0A8E4E; color: #0A8E4E; font-weight: 600; }
    .content { padding: 20px; }
    .section { display: none; }
    .section.active { display: block; }
    
    /* Cards */
    .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .card-title { font-size: 18px; font-weight: bold; color: #333; }
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .car-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .car-image { height: 150px; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 50px; }
    .car-info { padding: 15px; }
    .car-name { font-size: 16px; font-weight: bold; color: #333; }
    .car-plate { color: #666; font-size: 14px; margin: 5px 0; }
    .car-price { color: #0A8E4E; font-size: 18px; font-weight: bold; }
    .car-actions { display: flex; gap: 10px; margin-top: 10px; }
    
    /* Orders */
    .order-card { display: flex; justify-content: space-between; align-items: center; }
    .order-info { flex: 1; }
    .order-id { font-weight: bold; color: #333; }
    .order-detail { color: #666; font-size: 14px; margin-top: 4px; }
    .order-status { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-confirmed { background: #d4edda; color: #155724; }
    .status-completed { background: #cce5ff; color: #004085; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .modal-header h3 { font-size: 20px; color: #333; }
    .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #666; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    .empty { text-align: center; padding: 60px 20px; color: #999; }
    .empty-icon { font-size: 60px; margin-bottom: 20px; }
    
    .error { color: #e74c3c; text-align: center; margin-bottom: 15px; font-size: 14px; }
    .success { color: #0A8E4E; text-align: center; margin-bottom: 15px; font-size: 14px; }
    
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
    .stat-card { background: white; padding: 20px; border-radius: 10px; text-align: center; }
    .stat-number { font-size: 28px; font-weight: bold; color: #0A8E4E; }
    .stat-label { color: #666; font-size: 14px; margin-top: 5px; }
  </style>
</head>
<body>
  <!-- Login -->
  <div class="login-container" id="loginSection">
    <div class="login-box">
      <div class="login-logo">
        <h1>🚗 EazyRide</h1>
        <span>Provider Portal</span>
      </div>
      <div class="error" id="loginError"></div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+252612345678">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
      </div>
      <button class="btn" onclick="login()">Login</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboardSection">
    <div class="header">
      <h2>🚗 Provider Dashboard</h2>
      <button onclick="logout()">Logout</button>
    </div>
    
    <div class="tabs">
      <div class="tab active" onclick="showTab('cars')">My Cars</div>
      <div class="tab" onclick="showTab('orders')">Orders</div>
    </div>
    
    <div class="content">
      <!-- Cars Section -->
      <div class="section active" id="carsSection">
        <div class="stats" id="carStats">
          <div class="stat-card">
            <div class="stat-number" id="totalCars">0</div>
            <div class="stat-label">Total Cars</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="availableCars">0</div>
            <div class="stat-label">Available</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="totalBookings">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
        </div>
        <button class="btn btn-small" onclick="openCarModal()">+ Add New Car</button>
        <div class="card-grid" id="carsList"></div>
      </div>
      
      <!-- Orders Section -->
      <div class="section" id="ordersSection">
        <div class="card-grid" id="ordersList"></div>
      </div>
    </div>
  </div>

  <!-- Car Modal -->
  <div class="modal" id="carModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="carModalTitle">Add New Car</h3>
        <button class="modal-close" onclick="closeCarModal()">×</button>
      </div>
      <div class="error" id="carError"></div>
      <input type="hidden" id="carId">
      <div class="form-group">
        <label>Car Name *</label>
        <input type="text" id="carName" placeholder="e.g. Toyota Corolla">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Make *</label>
          <input type="text" id="carMake" placeholder="e.g. Toyota">
        </div>
        <div class="form-group">
          <label>Model</label>
          <input type="text" id="carModel" placeholder="e.g. Corolla">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Year</label>
          <input type="number" id="carYear" placeholder="2023">
        </div>
        <div class="form-group">
          <label>Plate Number *</label>
          <input type="text" id="carPlate" placeholder="SO 1234">
        </div>
      </div>
      <div class="form-group">
        <label>Price Per Day (USD) *</label>
        <input type="number" id="carPrice" placeholder="50">
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="carImage" placeholder="https://...">
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="carDescription" placeholder="Car features...">
      </div>
      <button class="btn" onclick="saveCar()" id="saveCarBtn">Add Car</button>
    </div>
  </div>

  <script>
    const API_URL = 'https://eazyride-haye-backend.onrender.com/api/v1';
    let token = localStorage.getItem('providerToken');
    
    // Check if already logged in
    if (token) {
      showDashboard();
    }

    async function login() {
      const phone = document.getElementById('phone').value;
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      
      if (!phone || !password) {
        errorEl.textContent = 'Please fill all fields';
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        
        if (!res.ok) throw new Error(data.error || 'Login failed');
        
        token = data.token;
        localStorage.setItem('providerToken', token);
        
        // Check if user is a provider
        if (data.user?.role !== 'SERVICE_PROVIDER') {
          errorEl.textContent = 'Access denied. This portal is for car rental providers only.';
          localStorage.removeItem('providerToken');
          return;
        }
        
        showDashboard();
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    function logout() {
      localStorage.removeItem('providerToken');
      location.reload();
    }

    function showDashboard() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('dashboardSection').style.display = 'block';
      loadCars();
      loadOrders();
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Section').classList.add('active');
    }

    async function loadCars() {
      try {
        const res = await fetch(`${API_URL}/car-rental/cars`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const cars = data.cars || data || [];
        
        document.getElementById('totalCars').textContent = cars.length;
        document.getElementById('availableCars').textContent = cars.filter(c => c.isAvailable !== false).length;
        
        const list = document.getElementById('carsList');
        if (cars.length === 0) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">🚗</div><p>No cars added yet</p></div>';
          return;
        }
        
        list.innerHTML = cars.map(car => `
          <div class="car-card">
            <div class="car-image">${car.imageUrl ? `<img src="${car.imageUrl}" style="width:100%;height:100%;object-fit:cover;">` : '🚗'}</div>
            <div class="car-info">
              <div class="car-name">${car.name || car.make + ' ' + car.model}</div>
              <div class="car-plate">${car.plateNumber || car.plate}</div>
              <div class="car-price">$${car.pricePerDay}/day</div>
              <div class="car-actions">
                <button class="btn btn-small btn-secondary" onclick="editCar('${car.id}')">Edit</button>
                <button class="btn btn-small btn-danger" onclick="deleteCar('${car.id}')">Delete</button>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    async function loadOrders() {
      try {
        const res = await fetch(`${API_URL}/car-rental/bookings/provider`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const orders = data.bookings || data || [];
        
        document.getElementById('totalBookings').textContent = orders.length;
        
        const list = document.getElementById('ordersList');
        if (orders.length === 0) {
          list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>No orders yet</p></div>';
          return;
        }
        
        const statusClass = { pending: 'status-pending', confirmed: 'status-confirmed', completed: 'status-completed', cancelled: 'status-cancelled' };
        
        list.innerHTML = orders.map(order => `
          <div class="card order-card">
            <div class="order-info">
              <div class="order-id">Booking #${order.id?.slice(-6)}</div>
              <div class="order-detail">Car: ${order.carName || order.car?.name || 'N/A'}</div>
              <div class="order-detail">Customer: ${order.riderName || order.rider?.firstName || 'N/A'}</div>
              <div class="order-detail">Total: $${order.totalPrice || order.total || 0}</div>
            </div>
            <span class="order-status ${statusClass[order.status] || 'status-pending'}">${order.status || 'pending'}</span>
          </div>
        `).join('');
      } catch (err) {
        console.error(err);
      }
    }

    function openCarModal(car = null) {
      document.getElementById('carModal').classList.add('active');
      document.getElementById('carError').textContent = '';
      
      if (car) {
        document.getElementById('carModalTitle').textContent = 'Edit Car';
        document.getElementById('carId').value = car.id;
        document.getElementById('carName').value = car.name || '';
        document.getElementById('carMake').value = car.make || '';
        document.getElementById('carModel').value = car.model || '';
        document.getElementById('carYear').value = car.year || '';
        document.getElementById('carPlate').value = car.plateNumber || car.plate || '';
        document.getElementById('carPrice').value = car.pricePerDay || '';
        document.getElementById('carImage').value = car.imageUrl || '';
        document.getElementById('carDescription').value = car.description || '';
        document.getElementById('saveCarBtn').textContent = 'Update Car';
      } else {
        document.getElementById('carModalTitle').textContent = 'Add New Car';
        document.getElementById('carId').value = '';
        document.getElementById('carName').value = '';
        document.getElementById('carMake').value = '';
        document.getElementById('carModel').value = '';
        document.getElementById('carYear').value = '';
        document.getElementById('carPlate').value = '';
        document.getElementById('carPrice').value = '';
        document.getElementById('carImage').value = '';
        document.getElementById('carDescription').value = '';
        document.getElementById('saveCarBtn').textContent = 'Add Car';
      }
    }

    function closeCarModal() {
      document.getElementById('carModal').classList.remove('active');
    }

    async function saveCar() {
      const carId = document.getElementById('carId').value;
      const carData = {
        name: document.getElementById('carName').value,
        make: document.getElementById('carMake').value,
        model: document.getElementById('carModel').value,
        year: parseInt(document.getElementById('carYear').value) || null,
        plateNumber: document.getElementById('carPlate').value,
        pricePerDay: parseFloat(document.getElementById('carPrice').value),
        imageUrl: document.getElementById('carImage').value,
        description: document.getElementById('carDescription').value
      };
      
      const errorEl = document.getElementById('carError');
      if (!carData.name || !carData.plateNumber || !carData.pricePerDay) {
        errorEl.textContent = 'Please fill required fields';
        return;
      }
      
      try {
        const url = carId ? `${API_URL}/car-rental/cars/${carId}` : `${API_URL}/car-rental/cars`;
        const method = carId ? 'PUT' : 'POST';
        
        const res = await fetch(url, {
          method,
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify(carData)
        });
        
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || 'Failed to save car');
        }
        
        closeCarModal();
        loadCars();
      } catch (err) {
        errorEl.textContent = err.message;
      }
    }

    async function editCar(carId) {
      try {
        const res = await fetch(`${API_URL}/car-rental/cars/${carId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const car = await res.json();
        openCarModal(car);
      } catch (err) {
        alert('Failed to load car');
      }
    }

    async function deleteCar(carId) {
      if (!confirm('Are you sure you want to delete this car?')) return;
      
      try {
        const res = await fetch(`${API_URL}/car-rental/cars/${carId}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error('Failed to delete');
        loadCars();
      } catch (err) {
        alert(err.message);
      }
    }
  </script>
</body>
</html>
