services:
  - type: web
    name: eazyride-api
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate
    startCommand: bash render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://eazyride-admin.onrender.com,https://eazyride-site.onrender.com
      - key: REDIS_URL
        value: ""
